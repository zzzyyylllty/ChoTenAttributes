# Attribute Definitions
# Each top-level key is the attribute ID (only a-z, 0-9, _ allowed)
# 属性定义
# 每个顶层键是属性 ID（仅允许 a-z, 0-9, _）
#
# Built-in attributes are registered by code, this file only serves as a reference.
# Config-defined attributes here will be loaded AFTER builtins and will be SKIPPED
# if they share an ID with a builtin.
# 内置属性由代码注册，此文件仅作为参考。
# 此处通过配置定义的属性将在内置属性之后加载，如果 ID 与内置属性重复则会被跳过。

